# ──────────────────────────────────────────────────────────────────
# VORTEX v3 — Nginx reverse-proxy config
#
# Place at: /etc/nginx/sites-available/vortex
# Enable:   sudo ln -s /etc/nginx/sites-available/vortex /etc/nginx/sites-enabled/
# Test:     sudo nginx -t
# Reload:   sudo systemctl reload nginx
#
# Replace YOUR_DOMAIN with your actual domain (e.g. vortex.example.com)
# After certbot runs it will add the SSL block automatically.
# ──────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Increase timeouts for long yt-dlp streams (some videos take time)
    proxy_read_timeout    600s;
    proxy_send_timeout    600s;
    proxy_connect_timeout 30s;

    # Don't buffer the stream response — pipe straight through
    proxy_buffering           off;
    proxy_request_buffering   off;

    # Forward real client IP to Node.js (so rate limiting works per user)
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host              $host;

    location / {
        proxy_pass http://127.0.0.1:3001;
    }

    # Increase max body size (for JSON payloads, not that we send large ones)
    client_max_body_size 2m;
}

# After running certbot, it will append an HTTPS server block below this line.
# certbot command: sudo certbot --nginx -d YOUR_DOMAIN
